<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The World Fallen 404</title>
<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Consolas, monospace;
}

/* fake desktop wallpaper */
#desktop{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80') center/cover;
    opacity:0;
}

/* CMD window */
#cmd{
    position:absolute;
    width:800px;
    height:450px;
    background:black;
    color:#0f0;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:10px;
    display:none;
    box-shadow:0 0 40px #0f0;
}

#text{
    white-space:pre-wrap;
    font-size:16px;
}

/* glitch overlay */
#glitch{
    position:fixed;
    inset:0;
    background:black;
    display:none;
}

/* final horror screen */
#final{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    text-align:center;
    color:red;
    background:black;
    animation:flash 0.3s infinite;
}

@keyframes flash{
    0%{filter:invert(0);}
    50%{filter:invert(1);}
    100%{filter:invert(0);}
}
</style>
</head>

<body>

<div id="desktop"></div>

<div id="cmd">
<div id="text"></div>
</div>

<div id="glitch"></div>

<div id="final">
THE GATES TO THIS WORLD IS NO MORE.<br>PERISH
</div>

<!-- AUDIO PLACEHOLDERS -->
<audio id="audio1" src="acsendingjumpscare.mp3"></audio>
<audio id="audio2" src="beforesoundline.mp3"></audio>
<audio id="audio3" src="HELL.mp3"></audio>

<script>

const desktop = document.getElementById("desktop");
const cmd = document.getElementById("cmd");
const text = document.getElementById("text");
const glitch = document.getElementById("glitch");
const final = document.getElementById("final");

function start(){

    // try fullscreen (requires gesture, so tied to first interaction)
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }

    desktop.style.opacity = 1;

    setTimeout(openCMD, 10000);
}

function openCMD(){
    cmd.style.display = "block";

    const lines = [
`Microsoft Windows [Version 10.0.22621.1265]
(c) Microsoft Corporation. All rights reserved.

C:\\Users\\YOU>`,
"locate user",
"User was found.",
"",
"C:\\Users\\YOU>locate me",
"Deep below the universe.",
"",
"C:\\Users\\YOU>open void",
"Void opened, access to the universe valid.",
"",
"C:\\Users\\YOU>IM_HERE.EXE"
];

    let i = 0;

    function type(){
        if(i < lines.length){
            text.innerHTML += lines[i] + "\n";
            i++;
            setTimeout(type, 700);
        } else {
            startGlitch();
        }
    }

    type();
}

function startGlitch(){

    // optional audio start
    // document.getElementById("audio1").play();

    let duration = 4050;
    glitch.style.display = "block";

    let interval = setInterval(()=>{
        document.body.style.transform = 
        `translate(${Math.random()*10-5}px,${Math.random()*10-5}px)`;
    },50);

    setTimeout(()=>{
        clearInterval(interval);
        glitch.style.display = "none";
        document.body.style.transform = "none";
        blackScreen();
    }, duration);
}

function blackScreen(){
    desktop.style.display = "none";
    cmd.style.display = "none";

    setTimeout(()=>{
        // document.getElementById("audio2").play();
        final.style.display = "flex";

        setTimeout(()=>{
            // document.getElementById("audio3").play();
        }, 5000);

    }, 5000);
}

document.addEventListener("click", start, {once:true});
</script>

</body>
</html>
